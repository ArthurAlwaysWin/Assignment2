<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expense Tracker</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h1>My Expense Tracker</h1>

        <form id="expense-form">
            <input type="hidden" id="expense-id">

            <div class="form">
                <label for="title">Title</label>
                <input type="text" id="title" name="title" placeholder="e.g., Breakfast" required>
            </div>

            <div class="form">
                <label for="category">Category</label>
                <select name="category" id="category" required>
                    <option value=""> Please choose a category of your expense</option>
                    <option value="Food">Food</option>
                    <option value="Transport">Transport</option>
                    <option value="Bills">Bills</option>
                    <option value="Entertainment">Entertainment</option>
                    <option value="Other">Other</option>
                </select>
            </div>

            <div class="form">
                <label for="amount">Amount</label>
                <input type="number" id="amount" name="amount" step="0.01" min="0" placeholder="0.00" required >
            </div>

            <div class="form">
                <label for="date">Date</label>
                <input type="date" id="date" name="date" required>
            </div>

            <div class="form">
                <label for="description">Description</label>
                <input type="text" id="description" name="description" placeholder="You may add brief description here if you want..">
            </div>

            <button type="submit" id="submit-btn">Add Expense</button>
        </form>

        <hr class="divider">

        <div id="filter-section">
            <h2>Filter Records</h2>
            <div class="filter-grid">
                <div class="form">
                    <label for="filter-start-date">Start Date</label>
                    <input type="date" id="filter-start-date" name="filter-start-date">
                </div>
                <div class="form">
                    <label for="filter-end-date">End Date</label>
                    <input type="date" id="filter-end-date" name="filter-end-date">
                </div>
                <div class="form">
                    <label for="filter-category">Category</label>
                    <select id="filter-category" name="filter-category">
                        <option value="">All Categories</option>
                        <option value="Food">Food</option>
                        <option value="Transport">Transport</option>
                        <option value="Bills">Bills</option>
                        <option value="Entertainment">Entertainment</option>
                        <option value="Other">Other</option>
                    </select>
                </div>
            </div>
            <div class="filter-actions">
                <button type="button" id="apply-filter-btn">Apply Filters</button>
                <button type="button" id="clear-filter-btn" class="btn-secondary">Clear Filters</button>
            </div>
        </div>

        <hr class="divider">

        <div id="summary-section">
            <h2>Summary</h2>
            <div id="total-summary" class="summary-text">
                Total Expenses: $0.00
            </div>
            <div id="category-summary"></div>

        </div>

        <hr class="divider">

        <div id="trend-section">
            <h2>Monthly Expenditure Trend</h2>
            <div id="monthly-trend"></div>
        </div>

        <hr class="divider">

        <div id="list-section">
            <h2> Expense History</h2>
            <div id="expense-list"></div>
        </div>
    </div>

    <script src="app.js"></script>
    
</body>
</html>
